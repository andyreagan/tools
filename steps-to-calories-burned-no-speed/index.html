<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Steps → Calorie Range — HTML.Tools</title>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f0f0f;--border:#2a2a2a;--muted:#777;--accent:#e74c3c;}
    body{font-family:system-ui,sans-serif;font-weight:300;background:var(--bg);color:#f0ede8;height:100vh;display:flex;flex-direction:column;}
    header{padding:.75rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1.5rem;flex-shrink:0;}
    .back{font-weight:700;font-size:1rem;color:var(--muted);text-decoration:none;letter-spacing:.08em;text-transform:uppercase;}
    .back:hover{color:var(--accent);}
    .back::before{content:'← ';}
    .tool-tag{font-size:.65rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);}
    h1{font-weight:800;font-size:1.4rem;letter-spacing:.02em;}
    iframe{flex:1;border:none;width:100%;background:#fff;}
  </style>
</head>
<body>
  <header>
    <a class="back" href="/">HTML.Tools</a>
    <div>
      <div class="tool-tag">Fitness</div>
      <h1>Steps → Calorie Range</h1>
    </div>
  </header>
  <iframe src="https://observablehq.com/embed/@andyreagan/steps-to-calories-burned-no-speed@77?cell=*" loading="lazy" title="Steps to Calorie Range"></iframe>
  <script src="/footer.js"></script>
</body>
</html>
