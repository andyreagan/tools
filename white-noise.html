<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Mix ambient sounds to create your perfect atmosphere. White noise, rain, ocean, fire, and more."/>
  <title>Ambient Sounds</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f0ede8; --surface:#ffffff; --dark:#1a1a1a;
      --mid:#666; --muted:#999; --border:#ddd; --accent:#e74c3c;
      --green:#27ae60;
    }
    body{
      font-family:system-ui,sans-serif;
      background:var(--bg); color:var(--dark);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; padding:2rem 1rem;
    }
    body::before{
      content:''; position:fixed; inset:0; z-index:0;
      background-image:repeating-linear-gradient(
        45deg, transparent, transparent 20px,
        rgba(0,0,0,0.02) 20px, rgba(0,0,0,0.02) 21px
      );
    }
    .page{position:relative;z-index:1;width:min(600px,100%);margin:auto 0;text-align:center;}

    header{margin-bottom:2rem;}
    h1{
      font-weight:700;
      font-size:clamp(2.2rem,7vw,3.5rem); text-transform:uppercase;
      letter-spacing:.04em; line-height:1;
    }
    .tagline{
      font-size:.8rem; color:var(--muted); letter-spacing:.1em;
      text-transform:uppercase; margin-top:.4rem;
    }

    .card{
      background:var(--surface); border:2px solid var(--dark);
      border-radius:4px; padding:2rem;
    }

    /* Sound grid */
    .sound-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:.75rem; margin-bottom:1.5rem;
    }
    @media(max-width:500px){
      .sound-grid{grid-template-columns:repeat(2,1fr);}
    }

    .sound-tile{
      background:#fafafa; border:2px solid var(--border);
      border-radius:3px; padding:1rem; cursor:pointer;
      transition:all .15s; display:flex; flex-direction:column;
      align-items:center; gap:.5rem;
      font-family:system-ui,sans-serif;
    }
    .sound-tile:hover{
      border-color:var(--dark);
    }
    .sound-tile.active{
      border-color:var(--dark); background:var(--dark);
    }
    .sound-tile svg{
      width:28px; height:28px; opacity:.6;
      color:var(--dark);
    }
    .sound-tile.active svg{
      opacity:1; color:#fff;
    }
    .sound-tile .name{
      font-size:.7rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted);
    }
    .sound-tile.active .name{
      color:rgba(255,255,255,.8);
    }

    /* Volume sliders */
    .sound-tile input[type="range"]{
      width:100%; height:4px; -webkit-appearance:none;
      background:var(--border); border-radius:2px; outline:none;
      margin-top:.25rem; opacity:0; transition:opacity .2s;
    }
    .sound-tile.active input[type="range"]{
      opacity:1; background:rgba(255,255,255,.2);
    }
    .sound-tile input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none; width:12px; height:12px;
      border-radius:50%; background:var(--dark); cursor:pointer;
    }
    .sound-tile.active input[type="range"]::-webkit-slider-thumb{
      background:#fff;
    }
    .sound-tile input[type="range"]::-moz-range-thumb{
      width:12px; height:12px; border-radius:50%;
      background:var(--dark); cursor:pointer; border:none;
    }
    .sound-tile.active input[type="range"]::-moz-range-thumb{
      background:#fff;
    }

    /* Master volume */
    .master-volume{
      display:flex; align-items:center; justify-content:center;
      gap:.75rem; padding:1rem;
      border:2px solid var(--border); border-radius:3px;
      background:#fafafa;
    }
    .master-volume label{
      font-size:.75rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted);
    }
    .master-volume input[type="range"]{
      width:140px; height:6px; -webkit-appearance:none;
      background:var(--border); border-radius:3px; outline:none;
    }
    .master-volume input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none; width:16px; height:16px;
      border-radius:50%; background:var(--dark); cursor:pointer;
    }
    .master-volume input[type="range"]::-moz-range-thumb{
      width:16px; height:16px; border-radius:50%;
      background:var(--dark); cursor:pointer; border:none;
    }
    .master-volume .value{
      font-size:.85rem; color:var(--mid); min-width:3em;
      font-variant-numeric:tabular-nums; font-weight:600;
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <h1>Ambient Sounds</h1>
    <div class="tagline">Mix sounds to create your perfect atmosphere</div>
  </header>

  <div class="card">
    <div class="sound-grid" id="soundGrid"></div>

    <div class="master-volume">
      <label>Master</label>
      <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.7" aria-label="Master volume">
      <span class="value" id="masterValue">70%</span>
    </div>
  </div>
</div>

<script>
  let audioContext = null;
  let masterGain = null;
  const activeSounds = {};

  const sounds = [
    { id: 'white', name: 'White', icon: 'wave' },
    { id: 'pink', name: 'Pink', icon: 'wave' },
    { id: 'brown', name: 'Brown', icon: 'wave' },
    { id: 'rain', name: 'Rain', icon: 'rain' },
    { id: 'wind', name: 'Wind', icon: 'wind' },
    { id: 'stream', name: 'Stream', icon: 'water' },
    { id: 'train', name: 'Train', icon: 'train' },
    { id: 'fire', name: 'Fire', icon: 'fire' },
    { id: 'ocean', name: 'Ocean', icon: 'ocean' },
  ];

  const icons = {
    wave: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12c1.5-3 3-4.5 4.5-4.5s3 3 4.5 4.5 3 4.5 4.5 4.5 3-1.5 4.5-4.5"/></svg>',
    rain: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 19v2m0-8v2m8 4v2m0-8v2m-4 6v2m0-8v2"/><path d="M4 13a5 5 0 0 1 5-5 4 4 0 0 1 8 1 4 4 0 0 1 3 4"/></svg>',
    wind: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>',
    water: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6c2-2 4-2 6 0s4 2 6 0 4-2 6 0m-18 6c2-2 4-2 6 0s4 2 6 0 4-2 6 0m-18 6c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/></svg>',
    train: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="14" rx="2"/><path d="M4 11h16M12 3v8M8 21l2-4h4l2 4M9 17h6"/><circle cx="8" cy="15" r="1" fill="currentColor"/><circle cx="16" cy="15" r="1" fill="currentColor"/></svg>',
    fire: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c0 4-4 6-4 10a4 4 0 0 0 8 0c0-4-4-6-4-10z"/><path d="M12 18a2 2 0 0 0 2-2c0-2-2-3-2-5-0 2-2 3-2 5a2 2 0 0 0 2 2z"/></svg>',
    ocean: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/><path d="M2 12c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/><path d="M2 18c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/></svg>',
  };

  function initAudio() {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioContext.createGain();
      masterGain.gain.value = document.getElementById('masterVolume').value;
      masterGain.connect(audioContext.destination);
    }
    if (audioContext.state === 'suspended') audioContext.resume();
  }

  function saveState() {
    const state = { master: document.getElementById('masterVolume').value, sounds: {} };
    document.querySelectorAll('.sound-tile').forEach(tile => {
      const id = tile.dataset.sound;
      state.sounds[id] = {
        volume: tile.querySelector('input').value,
        active: tile.classList.contains('active')
      };
    });
    localStorage.setItem('ambientState', JSON.stringify(state));
  }

  function loadState() {
    try {
      const state = JSON.parse(localStorage.getItem('ambientState'));
      if (!state) return null;
      document.getElementById('masterVolume').value = state.master;
      document.getElementById('masterValue').textContent = Math.round(state.master * 100) + '%';
      return state;
    } catch (e) { return null; }
  }

  function createNoiseBuffer(type) {
    const bufferSize = 2 * audioContext.sampleRate;
    const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
    const data = buffer.getChannelData(0);

    if (type === 'white') {
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    } else if (type === 'pink') {
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < bufferSize; i++) {
        const w = Math.random()*2-1;
        b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
        b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
        b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
        data[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
        b6=w*0.115926;
      }
    } else if (type === 'brown') {
      let lastOut=0;
      for (let i = 0; i < bufferSize; i++) {
        const w = Math.random()*2-1;
        data[i]=(lastOut+(0.02*w))/1.02; lastOut=data[i]; data[i]*=3.5;
      }
    }
    return buffer;
  }

  function createRainSound() {
    const bufferSize = 4*audioContext.sampleRate;
    const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i=0;i<bufferSize;i++){
      let s=Math.random()*2-1; if(Math.random()<0.002) s*=3; data[i]=s;
    }
    const source=audioContext.createBufferSource(); source.buffer=buffer; source.loop=true;
    const hp=audioContext.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=400;
    const lp=audioContext.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=8000;
    source.connect(hp); hp.connect(lp);
    return {source, output:lp};
  }

  function createWindSound() {
    const bufferSize = 4*audioContext.sampleRate;
    const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
    const data = buffer.getChannelData(0);
    let lastOut=0;
    for(let i=0;i<bufferSize;i++){
      const w=Math.random()*2-1; data[i]=(lastOut+(0.02*w))/1.02; lastOut=data[i]; data[i]*=3;
    }
    const source=audioContext.createBufferSource(); source.buffer=buffer; source.loop=true;
    const filter=audioContext.createBiquadFilter(); filter.type='bandpass'; filter.frequency.value=300; filter.Q.value=0.5;
    const lfo=audioContext.createOscillator(); lfo.frequency.value=0.2;
    const lfoGain=audioContext.createGain(); lfoGain.gain.value=150;
    lfo.connect(lfoGain); lfoGain.connect(filter.frequency); lfo.start();
    source.connect(filter);
    return {source, output:filter, lfo};
  }

  function createStreamSound() {
    const bufferSize = 4*audioContext.sampleRate;
    const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){data[i]=Math.random()*2-1; if(Math.random()<0.01) data[i]*=2;}
    const source=audioContext.createBufferSource(); source.buffer=buffer; source.loop=true;
    const bp=audioContext.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1000; bp.Q.value=0.3;
    const lp=audioContext.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=4000;
    source.connect(bp); bp.connect(lp);
    return {source, output:lp};
  }

  function createTrainSound() {
    const cycleDuration=1.5;
    const bufferSize=Math.floor(cycleDuration*audioContext.sampleRate);
    const buffer=audioContext.createBuffer(1,bufferSize,audioContext.sampleRate);
    const data=buffer.getChannelData(0);
    let lastOut=0;
    for(let i=0;i<bufferSize;i++){
      const w=Math.random()*2-1; data[i]=(lastOut+(0.02*w))/1.02; lastOut=data[i]; data[i]*=2;
    }
    const bumpDuration=Math.floor(0.08*audioContext.sampleRate);
    const bumps=[{start:0.0,intensity:1.0},{start:0.15,intensity:0.8},{start:0.75,intensity:0.95},{start:0.90,intensity:0.75}];
    for(const bump of bumps){
      const startSample=Math.floor(bump.start*audioContext.sampleRate);
      for(let i=0;i<bumpDuration&&startSample+i<bufferSize;i++){
        const env=Math.exp(-i/(bumpDuration*0.3))*bump.intensity;
        data[startSample+i]+=Math.sin(i*0.015)*env*0.8;
      }
    }
    const source=audioContext.createBufferSource(); source.buffer=buffer; source.loop=true;
    const lp=audioContext.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=300;
    source.connect(lp);
    return {source, output:lp};
  }

  function createFireSound() {
    const bufferSize=4*audioContext.sampleRate;
    const buffer=audioContext.createBuffer(1,bufferSize,audioContext.sampleRate);
    const data=buffer.getChannelData(0);
    let lastOut=0;
    for(let i=0;i<bufferSize;i++){
      const w=Math.random()*2-1; data[i]=(lastOut+(0.02*w))/1.02; lastOut=data[i]; data[i]*=2;
      if(Math.random()<0.001){
        const cl=Math.floor(Math.random()*800+200); const intensity=Math.random()*0.5+0.3;
        for(let j=0;j<cl&&i+j<bufferSize;j++){
          data[i+j]+=(Math.random()*2-1)*Math.exp(-j/(cl*0.2))*intensity;
        }
      }
    }
    const source=audioContext.createBufferSource(); source.buffer=buffer; source.loop=true;
    const bp=audioContext.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=500; bp.Q.value=0.5;
    source.connect(bp);
    return {source, output:bp};
  }

  function createOceanSound() {
    const cycleDuration=8;
    const bufferSize=Math.floor(cycleDuration*audioContext.sampleRate);
    const buffer=audioContext.createBuffer(1,bufferSize,audioContext.sampleRate);
    const data=buffer.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<bufferSize;i++){
      const w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      const pink=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
      b6=w*0.115926;
      const t=i/bufferSize;
      const wave=Math.pow(Math.sin(t*Math.PI),0.5);
      const crash=t>0.4&&t<0.6?Math.exp(-Math.pow((t-0.5)*10,2))*0.5:0;
      data[i]=pink*(wave+crash)*1.5;
    }
    const source=audioContext.createBufferSource(); source.buffer=buffer; source.loop=true;
    const lp=audioContext.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1500;
    source.connect(lp);
    return {source, output:lp};
  }

  function startSound(id) {
    initAudio();
    const tile=document.querySelector(`[data-sound="${id}"]`);
    const volumeSlider=tile.querySelector('input');
    const gain=audioContext.createGain();
    gain.gain.value=parseFloat(volumeSlider.value);
    gain.connect(masterGain);
    let source, extras={};

    if(id==='white'||id==='pink'||id==='brown'){
      source=audioContext.createBufferSource();
      source.buffer=createNoiseBuffer(id); source.loop=true; source.connect(gain);
    } else if(id==='rain'){const r=createRainSound();source=r.source;r.output.connect(gain);}
    else if(id==='wind'){const w=createWindSound();source=w.source;w.output.connect(gain);extras.lfo=w.lfo;}
    else if(id==='stream'){const s=createStreamSound();source=s.source;s.output.connect(gain);}
    else if(id==='train'){const t=createTrainSound();source=t.source;t.output.connect(gain);}
    else if(id==='fire'){const f=createFireSound();source=f.source;f.output.connect(gain);}
    else if(id==='ocean'){const o=createOceanSound();source=o.source;o.output.connect(gain);}

    source.start();
    activeSounds[id]={source,gain,...extras};
  }

  function stopSound(id) {
    if(activeSounds[id]){
      activeSounds[id].source.stop(); activeSounds[id].source.disconnect();
      activeSounds[id].gain.disconnect();
      if(activeSounds[id].lfo){activeSounds[id].lfo.stop();activeSounds[id].lfo.disconnect();}
      delete activeSounds[id];
    }
  }

  function toggleSound(id) {
    const tile=document.querySelector(`[data-sound="${id}"]`);
    if(activeSounds[id]){stopSound(id);tile.classList.remove('active');}
    else{startSound(id);tile.classList.add('active');}
    saveState();
  }

  function updateSoundVolume(id,value){
    if(activeSounds[id]) activeSounds[id].gain.gain.value=value;
  }

  const savedState=loadState();
  const grid=document.getElementById('soundGrid');
  sounds.forEach(sound=>{
    const tile=document.createElement('button');
    tile.className='sound-tile'; tile.dataset.sound=sound.id;
    tile.setAttribute('aria-label',`Toggle ${sound.name} sound`);
    tile.setAttribute('aria-pressed','false');
    const savedVolume=savedState?.sounds?.[sound.id]?.volume??0.5;
    tile.innerHTML=`${icons[sound.icon]}<span class="name">${sound.name}</span><input type="range" min="0" max="1" step="0.01" value="${savedVolume}" aria-label="${sound.name} volume">`;
    tile.addEventListener('click',e=>{
      if(e.target.type!=='range'){toggleSound(sound.id);tile.setAttribute('aria-pressed',tile.classList.contains('active'));}
    });
    tile.querySelector('input').addEventListener('input',e=>{
      e.stopPropagation(); updateSoundVolume(sound.id,e.target.value); saveState();
    });
    grid.appendChild(tile);
  });

  const masterSlider=document.getElementById('masterVolume');
  const masterValue=document.getElementById('masterValue');
  masterSlider.addEventListener('input',()=>{
    masterValue.textContent=Math.round(masterSlider.value*100)+'%';
    if(masterGain) masterGain.gain.value=masterSlider.value;
    saveState();
  });
</script>
<script src="/footer.js"></script>
</body>
</html>
