<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tacx Neo 2T Power Meter</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f0ede8; --surface:#ffffff; --dark:#1a1a1a;
      --mid:#666; --muted:#999; --border:#ddd; --accent:#e74c3c;
      --blue:#3b82f6; --green:#22c55e; --gold:#f59e0b;
    }
    body{
      font-family:system-ui,sans-serif;
      background:var(--bg); color:var(--dark);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; padding:2rem 1rem;
    }
    body::before{
      content:''; position:fixed; inset:0; z-index:0;
      background-image:repeating-linear-gradient(
        45deg, transparent, transparent 20px,
        rgba(0,0,0,0.02) 20px, rgba(0,0,0,0.02) 21px
      );
    }
    .page{position:relative;z-index:1;width:min(900px,100%);margin:auto 0;text-align:center;}

    header{margin-bottom:2rem;}
    h1{
      font-weight:700;
      font-size:clamp(2rem,7vw,3.5rem); text-transform:uppercase;
      letter-spacing:.04em; line-height:1;
    }
    .tagline{
      font-size:.8rem; color:var(--muted); letter-spacing:.1em;
      text-transform:uppercase; margin-top:.4rem;
    }

    .card{
      background:var(--surface); border:2px solid var(--dark);
      border-radius:4px; padding:2rem; margin-bottom:1rem;
    }

    /* Power hero */
    .power-hero{margin-bottom:1rem;}
    .power-hero .power-value{
      font-size:clamp(6rem,25vw,14rem); font-weight:700;
      line-height:1; color:var(--dark);
    }
    .power-hero .power-unit{
      font-size:.75rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted); margin-top:.25rem;
    }

    /* Speed */
    .speed-display{
      font-size:clamp(1.5rem,6vw,3rem); font-weight:700;
      color:var(--dark); margin-bottom:1.5rem;
    }
    .speed-display .speed-unit{
      font-size:.5em; color:var(--muted); font-weight:600;
    }

    /* Graph */
    .graph-section{
      border:2px solid var(--border); border-radius:3px;
      padding:1rem; margin-bottom:1.5rem; background:#fafafa;
    }
    .graph-header{
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:.5rem; padding:0 .25rem;
    }
    .graph-title{
      font-size:.75rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted);
    }
    .graph-stats{font-size:.8rem; color:var(--mid);}
    .graph-stats span{margin-left:1rem;}
    .graph-stats strong{color:var(--dark);}
    #powerGraph{width:100%; height:150px; display:block;}

    /* Resistance control */
    .resistance-control{
      border:2px solid var(--border); border-radius:3px;
      padding:1.25rem; margin-bottom:1.5rem; background:#fafafa;
    }
    .resistance-header{
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:1rem;
    }
    .resistance-title{
      font-size:.75rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted);
    }
    .resistance-value{
      font-size:1.1rem; color:var(--accent); font-weight:700;
    }
    .resistance-buttons{
      display:flex; gap:.5rem; align-items:center; justify-content:center;
    }
    .resistance-btn{
      width:50px; height:50px; border-radius:3px;
      border:2px solid var(--dark); font-size:1.4rem; font-weight:700;
      cursor:pointer; transition:all .15s;
      background:var(--dark); color:#fff;
    }
    .resistance-btn:hover:not(:disabled){
      background:#333;
    }
    .resistance-btn:disabled{
      background:transparent; color:var(--border);
      border-color:var(--border); cursor:not-allowed;
    }
    .resistance-bar{
      flex:1; max-width:300px; height:10px;
      background:var(--border); border-radius:5px;
      overflow:hidden; margin:0 1rem;
    }
    .resistance-fill{
      height:100%; background:var(--accent);
      border-radius:5px; transition:width .3s;
    }

    /* Status */
    .status{
      font-size:.75rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted);
      margin-bottom:1rem; min-height:1.5em;
    }
    .status.connected{color:var(--green);}
    .status.error{color:var(--accent);}

    /* Buttons */
    .buttons{margin-bottom:1rem;}
    button.connect-btn{
      font-family:system-ui,sans-serif;
      font-size:.85rem; font-weight:600; letter-spacing:.08em;
      text-transform:uppercase;
      background:var(--dark); color:#fff;
      border:2px solid var(--dark); border-radius:3px;
      padding:.6rem 1.6rem; cursor:pointer; transition:all .15s;
    }
    button.connect-btn:hover:not(:disabled){
      background:#333;
    }
    button.connect-btn:disabled{
      background:transparent; color:var(--border);
      border-color:var(--border); cursor:not-allowed;
    }
    .disconnect-btn{
      background:transparent !important; color:var(--mid) !important;
      border-color:var(--border) !important; margin-left:.5rem;
    }
    .disconnect-btn:hover:not(:disabled){
      border-color:var(--dark) !important; color:var(--dark) !important;
    }

    /* Settings */
    .settings{
      margin-top:1rem; padding-top:1rem;
      border-top:1px solid var(--border);
    }
    .settings-row{
      display:flex; align-items:center; justify-content:center;
      gap:.75rem; flex-wrap:wrap;
    }
    .settings-row label{
      font-size:.75rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--muted);
    }
    .settings-row input{
      width:70px; padding:.4rem .6rem; border-radius:3px;
      border:2px solid var(--border); background:#fafafa;
      color:var(--dark); font-size:.9rem; text-align:center;
      font-family:system-ui,sans-serif;
    }
    .settings-row input:focus{outline:none; border-color:var(--dark);}
    .settings-unit{font-size:.8rem; color:var(--mid);}

    .info{
      margin-top:1rem; font-size:.75rem; color:var(--muted);
      letter-spacing:.04em;
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <h1>Tacx Neo 2T</h1>
    <div class="tagline">Bluetooth power meter &amp; trainer control</div>
  </header>

  <div class="card">
    <div class="power-hero">
      <div class="power-value" id="power">---</div>
      <div class="power-unit">watts</div>
    </div>

    <div class="speed-display">
      <span id="speed">--.-</span> <span class="speed-unit">mph</span>
    </div>

    <div class="graph-section">
      <div class="graph-header">
        <div class="graph-title">Power (60s)</div>
        <div class="graph-stats">
          <span>Avg: <strong id="avgPower">---</strong>W</span>
          <span>Max: <strong id="maxPower">---</strong>W</span>
        </div>
      </div>
      <canvas id="powerGraph"></canvas>
    </div>

    <div class="resistance-control" id="resistanceControl" style="display: none;">
      <div class="resistance-header">
        <div class="resistance-title">Resistance Level</div>
        <div class="resistance-value" id="resistanceValue">50%</div>
      </div>
      <div class="resistance-buttons">
        <button class="resistance-btn" id="decreaseBtn" onclick="adjustResistance(-10)" disabled>−</button>
        <div class="resistance-bar">
          <div class="resistance-fill" id="resistanceFill" style="width: 50%"></div>
        </div>
        <button class="resistance-btn" id="increaseBtn" onclick="adjustResistance(10)" disabled>+</button>
      </div>
    </div>

    <div class="status" id="status">Not connected</div>

    <div class="buttons">
      <button class="connect-btn" id="connectBtn" onclick="connect()">Connect to Trainer</button>
      <button class="connect-btn disconnect-btn" id="disconnectBtn" onclick="disconnect()" style="display: none;">Disconnect</button>
    </div>

    <div class="settings">
      <div class="settings-row">
        <label>Rider + Bike Weight:</label>
        <input type="number" id="totalWeight" value="180" min="50" max="400">
        <span class="settings-unit">lbs</span>
      </div>
    </div>

    <div class="info">
      Requires a browser with Web Bluetooth support (Chrome, Edge, Opera)
    </div>
  </div>
</div>

<script>
  // Bluetooth GATT UUIDs
  const CYCLING_POWER_SERVICE = 0x1818;
  const CYCLING_POWER_MEASUREMENT = 0x2A63;
  const FITNESS_MACHINE_SERVICE = 0x1826;
  const FITNESS_MACHINE_CONTROL_POINT = 0x2AD9;

  // Tacx proprietary FE-C over BLE service
  const TACX_FEC_SERVICE = '6e40fec1-b5a3-f393-e0a9-e50e24dcca9e';
  const TACX_FEC_WRITE = '6e40fec2-b5a3-f393-e0a9-e50e24dcca9e';
  const TACX_FEC_READ = '6e40fec3-b5a3-f393-e0a9-e50e24dcca9e';

  let device = null;
  let server = null;
  let powerCharacteristic = null;
  let controlPointCharacteristic = null;
  let tacxWriteCharacteristic = null;
  let currentResistance = 50;
  let controlAcquired = false;
  let useTacxProtocol = false;

  // Power history for graph
  const powerHistory = [];
  const maxHistoryLength = 60;
  let canvas, ctx;

  function initGraph() {
    canvas = document.getElementById('powerGraph');
    ctx = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    drawGraph();
  }

  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width - 32;
    canvas.height = 150;
    drawGraph();
  }

  function drawGraph() {
    const width = canvas.width;
    const height = canvas.height;

    ctx.fillStyle = '#fafafa';
    ctx.fillRect(0, 0, width, height);

    if (powerHistory.length < 2) {
      ctx.fillStyle = '#999';
      ctx.font = '13px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Waiting for data…', width / 2, height / 2);
      return;
    }

    const maxPower = Math.max(...powerHistory, 100);
    const scale = (height - 20) / maxPower;

    // Grid lines
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 1;
    const gridLines = 4;
    for (let i = 0; i <= gridLines; i++) {
      const y = height - (i * (height - 20) / gridLines) - 10;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(width, y);
      ctx.stroke();

      ctx.fillStyle = '#999';
      ctx.font = '10px system-ui, sans-serif';
      ctx.textAlign = 'left';
      const watts = Math.round((i * maxPower) / gridLines);
      ctx.fillText(watts + 'W', 5, y - 3);
    }

    // Power line
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 2;
    ctx.beginPath();

    const stepX = width / (maxHistoryLength - 1);

    for (let i = 0; i < powerHistory.length; i++) {
      const x = (maxHistoryLength - powerHistory.length + i) * stepX;
      const y = height - 10 - (powerHistory[i] * scale);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Gradient fill
    const gradient = ctx.createLinearGradient(0, 0, 0, height);
    gradient.addColorStop(0, 'rgba(231, 76, 60, 0.2)');
    gradient.addColorStop(1, 'rgba(231, 76, 60, 0)');

    ctx.fillStyle = gradient;
    ctx.beginPath();
    for (let i = 0; i < powerHistory.length; i++) {
      const x = (maxHistoryLength - powerHistory.length + i) * stepX;
      const y = height - 10 - (powerHistory[i] * scale);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    const lastX = (maxHistoryLength - 1) * stepX;
    ctx.lineTo(lastX, height - 10);
    ctx.lineTo((maxHistoryLength - powerHistory.length) * stepX, height - 10);
    ctx.closePath();
    ctx.fill();
  }

  function updateStats() {
    if (powerHistory.length === 0) return;
    const avg = Math.round(powerHistory.reduce((a, b) => a + b, 0) / powerHistory.length);
    const max = Math.max(...powerHistory);
    document.getElementById('avgPower').textContent = avg;
    document.getElementById('maxPower').textContent = max;
  }

  function powerToSpeed(watts) {
    if (watts <= 0) return 0;
    const weightLbs = parseFloat(document.getElementById('totalWeight').value) || 180;
    const mass = weightLbs * 0.453592;
    const g = 9.81;
    const Crr = 0.005;
    const CdA = 0.35;
    const rho = 1.225;

    let v = 5;
    for (let i = 0; i < 10; i++) {
      const f = Crr * mass * g * v + 0.5 * rho * CdA * Math.pow(v, 3) - watts;
      const fPrime = Crr * mass * g + 1.5 * rho * CdA * Math.pow(v, 2);
      v = v - f / fPrime;
      if (v < 0) v = 0.1;
    }
    return v * 2.23694;
  }

  function setStatus(message, type = '') {
    const statusEl = document.getElementById('status');
    statusEl.textContent = message;
    statusEl.className = 'status ' + type;
  }

  function setPower(watts) {
    document.getElementById('power').textContent = watts;
    const speed = powerToSpeed(watts);
    document.getElementById('speed').textContent = speed.toFixed(1);

    powerHistory.push(watts);
    if (powerHistory.length > maxHistoryLength) powerHistory.shift();

    drawGraph();
    updateStats();
  }

  function updateResistanceUI() {
    document.getElementById('resistanceValue').textContent = currentResistance + '%';
    document.getElementById('resistanceFill').style.width = currentResistance + '%';
  }

  async function adjustResistance(delta) {
    const newResistance = Math.max(0, Math.min(100, currentResistance + delta));
    if (newResistance === currentResistance) return;

    try {
      if (useTacxProtocol && tacxWriteCharacteristic) {
        const command = buildTacxResistanceCommand(newResistance);
        await tacxWriteCharacteristic.writeValueWithoutResponse(command);
        currentResistance = newResistance;
        updateResistanceUI();
      } else if (controlPointCharacteristic && controlAcquired) {
        const resistanceValue = Math.round(newResistance * 2);
        const command = new Uint8Array([0x04, resistanceValue & 0xFF, (resistanceValue >> 8) & 0xFF]);
        const responsePromise = waitForControlResponse(0x04);
        await controlPointCharacteristic.writeValueWithResponse(command);
        const success = await responsePromise;
        if (success) {
          currentResistance = newResistance;
          updateResistanceUI();
        }
      }
    } catch (error) {
      console.error('Error setting resistance:', error);
      setStatus('Error setting resistance: ' + error.message, 'error');
    }
  }

  function waitForControlResponse(expectedOpCode, timeout = 3000) {
    return new Promise((resolve, reject) => {
      const timeoutId = setTimeout(() => {
        controlPointCharacteristic.removeEventListener('characteristicvaluechanged', handler);
        reject(new Error('Control response timeout'));
      }, timeout);

      function handler(event) {
        const value = event.target.value;
        const responseCode = value.getUint8(0);
        const requestOpCode = value.getUint8(1);
        const resultCode = value.getUint8(2);

        if (responseCode === 0x80 && requestOpCode === expectedOpCode) {
          clearTimeout(timeoutId);
          controlPointCharacteristic.removeEventListener('characteristicvaluechanged', handler);
          resolve(resultCode === 0x01);
        }
      }
      controlPointCharacteristic.addEventListener('characteristicvaluechanged', handler);
    });
  }

  async function requestControl() {
    if (!controlPointCharacteristic) return false;
    try {
      const command = new Uint8Array([0x00]);
      const responsePromise = waitForControlResponse(0x00);
      await controlPointCharacteristic.writeValueWithResponse(command);
      return await responsePromise;
    } catch (error) {
      console.error('Error requesting control:', error);
      return false;
    }
  }

  async function connect() {
    try {
      setStatus('Searching for trainer…');
      document.getElementById('connectBtn').disabled = true;

      device = await navigator.bluetooth.requestDevice({
        filters: [
          { services: [CYCLING_POWER_SERVICE] },
          { services: [FITNESS_MACHINE_SERVICE] },
          { services: [TACX_FEC_SERVICE] },
          { namePrefix: 'TACX' },
          { namePrefix: 'Tacx' }
        ],
        optionalServices: [CYCLING_POWER_SERVICE, FITNESS_MACHINE_SERVICE, TACX_FEC_SERVICE]
      });

      setStatus('Connecting to ' + device.name + '…');
      device.addEventListener('gattserverdisconnected', onDisconnected);
      server = await device.gatt.connect();

      // Discover available services
      try {
        const services = await server.getPrimaryServices();
        for (const service of services) {
          console.log('Service:', service.uuid);
          try {
            const chars = await service.getCharacteristics();
            for (const char of chars) {
              console.log('  Char:', char.uuid, Object.keys(char.properties).filter(k => char.properties[k]).join(', '));
            }
          } catch (e) { /* skip */ }
        }
      } catch (e) { /* skip */ }

      setStatus('Getting power service…');
      const powerService = await server.getPrimaryService(CYCLING_POWER_SERVICE);
      powerCharacteristic = await powerService.getCharacteristic(CYCLING_POWER_MEASUREMENT);
      await powerCharacteristic.startNotifications();
      powerCharacteristic.addEventListener('characteristicvaluechanged', handlePowerData);

      let controlServiceFound = false;

      // Try Tacx FE-C first
      try {
        const tacxService = await server.getPrimaryService(TACX_FEC_SERVICE);
        tacxWriteCharacteristic = await tacxService.getCharacteristic(TACX_FEC_WRITE);
        const tacxReadCharacteristic = await tacxService.getCharacteristic(TACX_FEC_READ);
        await tacxReadCharacteristic.startNotifications();
        tacxReadCharacteristic.addEventListener('characteristicvaluechanged', handleTacxResponse);

        useTacxProtocol = true;
        controlAcquired = true;
        controlServiceFound = true;

        document.getElementById('resistanceControl').style.display = 'block';
        document.getElementById('decreaseBtn').disabled = false;
        document.getElementById('increaseBtn').disabled = false;
        setStatus('Connected to ' + device.name + ' (Tacx FE-C)', 'connected');
      } catch (e) {
        console.log('Tacx FE-C not available:', e.message);
      }

      // Fall back to FTMS
      if (!controlServiceFound) {
        try {
          const ftmsService = await server.getPrimaryService(FITNESS_MACHINE_SERVICE);
          controlPointCharacteristic = await ftmsService.getCharacteristic(FITNESS_MACHINE_CONTROL_POINT);
          await controlPointCharacteristic.startNotifications();
          controlPointCharacteristic.addEventListener('characteristicvaluechanged', handleControlResponse);

          try {
            controlAcquired = await requestControl();
            if (controlAcquired) {
              document.getElementById('resistanceControl').style.display = 'block';
              document.getElementById('decreaseBtn').disabled = false;
              document.getElementById('increaseBtn').disabled = false;
              controlServiceFound = true;
              setStatus('Connected to ' + device.name + ' (FTMS)', 'connected');
            } else {
              setStatus('Connected (trainer denied control)', 'connected');
            }
          } catch (controlError) {
            setStatus('Connected (control timed out)', 'connected');
          }
        } catch (ftmsError) {
          console.log('FTMS not available:', ftmsError.message);
        }
      }

      if (!controlServiceFound) {
        setStatus('Connected (no resistance control)', 'connected');
      }

      document.getElementById('connectBtn').style.display = 'none';
      document.getElementById('disconnectBtn').style.display = 'inline-block';
    } catch (error) {
      console.error('Connection error:', error);
      setStatus('Error: ' + error.message, 'error');
      document.getElementById('connectBtn').disabled = false;
    }
  }

  function handlePowerData(event) {
    const value = event.target.value;
    const flags = value.getUint16(0, true);
    const power = value.getInt16(2, true);
    setPower(Math.max(0, power));
  }

  function handleControlResponse(event) {
    const value = event.target.value;
    const responseCode = value.getUint8(0);
    const requestOpCode = value.getUint8(1);
    const resultCode = value.getUint8(2);
    if (responseCode === 0x80) {
      console.log(resultCode === 0x01 ? 'Control command successful' : 'Control command failed: ' + resultCode);
    }
  }

  function handleTacxResponse(event) {
    const value = event.target.value;
    const bytes = [];
    for (let i = 0; i < value.byteLength; i++) {
      bytes.push(value.getUint8(i).toString(16).padStart(2, '0'));
    }
    console.log('Tacx response:', bytes.join(' '));
  }

  function buildTacxResistanceCommand(resistancePercent) {
    const resistance = Math.round(resistancePercent * 2);
    const payload = new Uint8Array([
      0xA4, 0x09, 0x4F, 0x05,
      0x30, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, resistance,
    ]);
    let checksum = 0;
    for (let i = 0; i < payload.length; i++) checksum ^= payload[i];
    const message = new Uint8Array(payload.length + 1);
    message.set(payload);
    message[payload.length] = checksum;
    return message;
  }

  function onDisconnected() {
    setStatus('Disconnected', 'error');
    document.getElementById('power').textContent = '---';
    document.getElementById('speed').textContent = '--.-';
    document.getElementById('connectBtn').style.display = 'inline-block';
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('disconnectBtn').style.display = 'none';
    document.getElementById('resistanceControl').style.display = 'none';
    document.getElementById('decreaseBtn').disabled = true;
    document.getElementById('increaseBtn').disabled = true;
    controlAcquired = false;
    useTacxProtocol = false;
    tacxWriteCharacteristic = null;
    controlPointCharacteristic = null;
  }

  function disconnect() {
    if (device && device.gatt.connected) device.gatt.disconnect();
  }

  initGraph();

  if (!navigator.bluetooth) {
    setStatus('Web Bluetooth is not supported in this browser', 'error');
    document.getElementById('connectBtn').disabled = true;
  }
</script>
<script src="/footer.js"></script>
</body>
</html>
